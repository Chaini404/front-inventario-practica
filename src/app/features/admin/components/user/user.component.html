<div class="bg-white rounded-2xl shadow-md p-6">

    <div class="flex justify-between items-center mb-6">

        <h2 class="text-2xl font-bold text-gray-800">
            Usuarios
        </h2>

        <button
            class="bg-gradient-to-r from-blue-600 to-purple-600 text-white px-4 py-2 rounded-lg hover:opacity-90">

            + Agregar Usuario

        </button>

    </div>

    <table class="w-full">

        <thead>

            <tr class="bg-slate-100">

                <th class="p-3 text-left">ID</th>
                <th class="p-3 text-left">Usuario</th>
                <th class="p-3 text-left">Rol</th>
                <th class="p-3 text-center">Estado</th>
                <th class="p-3 text-center">Acciones</th>

            </tr>

        </thead>

        <tbody>

            @for(user of users; track user.id){

            <tr class="border-b hover:bg-slate-50">

                <td class="p-3">
                    {{user.id}}
                </td>

                <td class="p-3">
                    {{user.username}}
                </td>

                <td class="p-3">

                    @if(user.role === 'ADMIN'){

                    <span
                        class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-sm font-medium">

                        ADMIN

                    </span>

                    } @else {

                    <span
                        class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm font-medium">

                        EMPLOYEE

                    </span>

                    }

                </td>

                <td class="p-3 text-center">

                    <label class="relative inline-flex items-center cursor-pointer">

                        <input
                            type="checkbox"
                            class="sr-only peer"
                            [checked]="user.active">

                        <div
                            class="w-11 h-6 bg-gray-300 rounded-full
                                   peer-checked:bg-green-500
                                   after:content-['']
                                   after:absolute
                                   after:top-[2px]
                                   after:left-[2px]
                                   after:bg-white
                                   after:border
                                   after:rounded-full
                                   after:h-5
                                   after:w-5
                                   after:transition-all
                                   peer-checked:after:translate-x-full">

                        </div>

                    </label>

                </td>

                <td class="p-3 text-center">

                    <button
                        (click)="openModal(user)"
                        class="bg-blue-100 text-blue-600 p-2 rounded-lg hover:bg-blue-200 transition">

                        ✏️

                    </button>

                </td>

            </tr>

            }

        </tbody>

    </table>

</div>

@if(modalOpen){

<div
    class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">

    <div
        class="bg-white rounded-2xl shadow-xl w-[500px] p-6">

        <h2 class="text-2xl font-bold mb-6">

            Editar Usuario

        </h2>

        <div class="space-y-4">

            <input
                [(ngModel)]="selectedUser.username"
                class="w-full border rounded-lg p-3"
                placeholder="Usuario">

            <select
                [(ngModel)]="selectedUser.role"
                class="w-full border rounded-lg p-3">

                <option value="ADMIN">
                    ADMIN
                </option>

                <option value="EMPLOYEE">
                    EMPLOYEE
                </option>

            </select>

        </div>

        <div class="flex justify-end gap-3 mt-6">

            <button
                (click)="closeModal()"
                class="px-4 py-2 border rounded-lg">

                Cancelar

            </button>

            <button
                class="px-4 py-2 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-lg">

                Guardar

            </button>

        </div>

    </div>

</div>

}
