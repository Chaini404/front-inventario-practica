<div class="bg-white rounded-2xl shadow-md p-6">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-6">

        <h2 class="text-2xl font-bold text-gray-800">
            Usuarios
        </h2>

    </div>


    <!-- CONTADOR -->
    <div class="bg-yellow-100 p-2 mb-4 rounded-lg">
        Usuarios cargados: {{ users.length }}
    </div>



    <!-- SIN USUARIOS -->
    <div 
        *ngIf="users.length === 0"
        class="text-center py-4 text-gray-500">

        No hay usuarios registrados.

    </div>



    <!-- TABLA -->
    <table 
        *ngIf="users.length > 0"
        class="w-full border-collapse">


        <thead>

            <tr class="bg-slate-100">

                <th class="p-3 text-left">
                    ID
                </th>

                <th class="p-3 text-left">
                    Usuario
                </th>

                <th class="p-3 text-left">
                    Rol
                </th>

                <th class="p-3 text-left">
                    Estado
                </th>

                <th class="p-3 text-center">
                    Acciones
                </th>

            </tr>

        </thead>



        <tbody>


            <tr 
                *ngFor="let user of users"
                class="border-b hover:bg-slate-50">


                <td class="p-3">
                    {{ user.id }}
                </td>



                <td class="p-3">
                    {{ user.username }}
                </td>



                <td class="p-3">


                    <span
                    *ngIf="user.role === 'ADMIN'"
                    class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-sm font-medium">

                        ADMIN

                    </span>


                    <span
                    *ngIf="user.role !== 'ADMIN'"
                    class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm font-medium">

                        {{user.role}}

                    </span>


                </td>



                <td class="p-3">


                    <label class="relative inline-flex items-center cursor-pointer">


                        <input
                            type="checkbox"
                            class="sr-only peer"
                            [checked]="user.active">


                        <div
                            class="w-11 h-6 bg-gray-300 rounded-full
                            peer-checked:bg-green-500
                            after:content-['']
                            after:absolute
                            after:top-[2px]
                            after:left-[2px]
                            after:bg-white
                            after:border
                            after:rounded-full
                            after:h-5
                            after:w-5
                            after:transition-all
                            peer-checked:after:translate-x-full">
                        </div>


                    </label>


                </td>




                <td class="p-3">


                    <div class="flex justify-center">


                        <button
                            (click)="openModal(user)"
                            class="bg-blue-100 text-blue-600 p-2 rounded-lg hover:bg-blue-200 transition">

                            ✏️

                        </button>


                    </div>


                </td>


            </tr>


        </tbody>


    </table>

</div>
