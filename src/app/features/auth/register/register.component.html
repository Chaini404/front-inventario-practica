<div class="min-h-screen flex items-center justify-center bg-slate-100">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">

        <h2 class="text-3xl font-bold text-center text-purple-700 mb-2">
            Crear Cuenta
        </h2>

        <p class="text-center text-slate-500 mb-6">
            Regístrate para acceder al sistema
        </p>

        <form [formGroup]="registerForm" (ngSubmit)="registrar()">

            <div class="mb-4">
                <label class="block mb-2 font-medium">
                    Nombre
                </label>

                <input
                    type="text"
                    formControlName="nombre"
                    class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
            </div>

            <div class="mb-4">
                <label class="block mb-2 font-medium">
                    Apellido
                </label>

                <input
                    type="text"
                    formControlName="apellido"
                    class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
            </div>

            <div class="mb-4">
                <label class="block mb-2 font-medium">
                    Correo
                </label>

                <input
                type="email"
                formControlName="email"
                class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="correo@ejemplo.com">
                <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" 
                class="text-red-500 text-sm mt-1">
                Ingresa un correo válido
            </div>
            </div>

            <div class="mb-4">
                <label class="block mb-2 font-medium">
                    Contraseña
                </label>

                <input
                    type="password"
                    formControlName="password"
                    class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
            </div>

            <div class="mb-6">
                <label class="block mb-2 font-medium">
                    Confirmar Contraseña
                </label>

                <input
                    type="password"
                    formControlName="confirmarPassword"
                    class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
                <div *ngIf="error" class="text-red-500 text-sm text-center mt-4">
                {{ error }}
                </div>

                <div *ngIf="mensaje" class="text-green-500 text-sm text-center mt-4">
                {{ mensaje }}
                </div>
            <button
                type="submit"
                [disabled]="loading"
                class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white py-3 rounded-lg font-semibold hover:opacity-90 transition disabled:opacity-50">

                {{ loading ? 'Registrando...' : 'Registrarse' }}

            </button>

        </form>

    </div>

</div>
