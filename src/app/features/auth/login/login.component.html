<div class="min-h-screen flex items-center justify-center bg-slate-100">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">

        <h2 class="text-3xl font-bold text-center text-purple-700 mb-2">
            Iniciar Sesión
        </h2>

        <p class="text-center text-slate-500 mb-6">
            Bienvenido nuevamente
        </p>

        <!-- Mensaje de error -->
        <div *ngIf="error" 
            class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-4 flex items-center gap-2">
            <span class="text-xl">⚠️</span>
            <span>{{ error }}</span>
        </div>

        <!-- Mensaje de éxito -->
        <div *ngIf="successMessage" 
            class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-lg mb-4 flex items-center gap-2">
            <span class="text-xl">✅</span>
            <span>{{ successMessage }}</span>
        </div>


        <form [formGroup]="loginForm" (ngSubmit)="iniciarSesion()">

            <div class="mb-4">

                <label class="block mb-2 font-medium">
                    Correo Electrónico
                </label>

                <input
                    type="email"
                    formControlName="email"
                    class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500"
                    placeholder="correo@ejemplo.com">

                <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" 
                     class="text-red-500 text-sm mt-1">
                    Ingresa un correo válido
                </div>

            </div>


            <div class="mb-6">

                <label class="block mb-2 font-medium">
                    Contraseña
                </label>

                <input
                    type="password"
                    formControlName="password"
                    class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500"
                    placeholder="Ingresa tu contraseña">

            </div>


            <button
                type="submit"
                [disabled]="loading"
                class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white py-3 rounded-lg font-semibold hover:opacity-90 transition disabled:opacity-50">

                {{ loading ? 'Ingresando...' : 'Ingresar' }}

            </button>


        </form>


        <div class="text-center mt-5">

            <span class="text-slate-500">
                ¿No tienes cuenta?
            </span>

            <a
                routerLink="/register"
                class="text-purple-700 font-semibold ml-1 hover:underline">
                Regístrate
            </a>

        </div>


    </div>

</div>
